$schema: https://json-schema.org/draft/2020-12/schema
$id: https://meshcore-atlas/schema/compatibility.yaml
title: Compatibility Report
description: >
  Optional evidence/details for one firmware version on one device. Firmware
  device support is listed in firmware.yaml; compatibility reports add richer
  verification when somebody has tested or researched a specific combination.
  firmwareId, firmwareVersion, and deviceId are inferred from
  data/compatibility/<firmware>/<version>/<device>.yaml.
type: object
additionalProperties: false
properties:
  status:
    enum:
      - supported
      - partial
      - untested
      - unsupported
  support:
    type: object
    additionalProperties: false
    properties:
      availability:
        enum:
          - available
          - unavailable
          - unknown
      level:
        enum:
          - official
          - vendor
          - community
          - experimental
      verification:
        enum:
          - unknown
          - imported-unverified
          - boots
          - radio-tested
          - verified
  roles:
    type: object
    additionalProperties: false
    patternProperties:
      ^(companion|repeater|room-server|observer|sensor|kiss-modem|standalone-ui)$:
        type: object
        additionalProperties: false
        properties:
          status:
            enum:
              - verified
              - boots
              - untested
              - unsupported
              - unknown
          transports:
            type: object
            additionalProperties: false
            patternProperties:
              ^(ble|usb|tcp|wifi|ethernet|serial)$:
                enum:
                  - verified
                  - boots
                  - untested
                  - unsupported
                  - unknown
          management:
            type: object
            additionalProperties: false
            patternProperties:
              ^(serialCli|wifiOta|bleDfu|webUi)$:
                enum:
                  - verified
                  - boots
                  - untested
                  - unsupported
                  - unknown
  peripherals:
    type: object
    additionalProperties: false
    patternProperties:
      ^(display|gnss|battery|buttons|sd|sensors|wifi|ble|externalFlash)$:
        enum:
          - verified
          - boots
          - untested
          - unsupported
          - unknown
  builds:
    type: array
    items:
      type: object
      additionalProperties: false
      properties:
        target:
          type: string
          pattern: ^[A-Za-z0-9_.-]+$
        platformio_board:
          type: string
          pattern: ^[A-Za-z0-9_.-]+$
        role:
          enum:
            - companion
            - repeater
            - room-server
            - observer
            - sensor
            - kiss-modem
            - standalone-ui
        transports:
          type: array
          items:
            enum:
              - ble
              - usb
              - tcp
              - wifi
              - ethernet
              - serial
        artifactSource:
          enum:
            - github-release
            - web-flasher
            - source-build
            - manual
            - unknown
  verification:
    type: object
    additionalProperties: false
    properties:
      firmwareVersion:
        type: string
      hardwareRevision:
        type: string
      testedAt:
        type: string
      testedBy:
        type: string
      evidenceUrl:
        type: string
        pattern: ^https?://
      confidence:
        enum:
          - manufacturer
          - upstream-maintainer
          - community-tested
          - inferred-from-source
          - imported-unverified
          - unknown
  notes:
    type: string
  provenance:
    type: object
    additionalProperties: false
    properties:
      source:
        type: string
      sourceUrl:
        type: string
        pattern: ^https?://
      importedAt:
        type: string
required:
  - status
