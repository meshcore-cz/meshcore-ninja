name: meshcore-go
short_name: meshcore-go
kind: library
status: active
maturity: alpha
description: >-
  Pure Go implementation of the MeshCore protocol. Provides encode/decode for
  all protocol payload types, cryptography, identity/key management, the
  companion protocol (frame layer, commands/responses, push notifications),
  serial/TCP transports, a high-level client, hardware modem abstraction with
  KISS framing, and a node runtime with routing and peer management.

maintainers:
  - name: meshcore-go
    url: https://github.com/meshcore-go

