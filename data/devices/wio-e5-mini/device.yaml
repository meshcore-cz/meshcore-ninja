# Source: https://wiki.seeedstudio.com/LoRa_E5_mini/
# Source: https://files.seeedstudio.com/products/113990939/LoRa-E5%20mini%20v1.0.pdf
name: Seeed Studio Wio-E5 mini
vendorId: seeed
kind: product
lifecycle: active
familyId: seeed-wio-e5-mini
official: true
product_url: https://wiki.seeedstudio.com/LoRa_E5_mini/
description: >-
  Compact Wio-E5 LoRaWAN development board with factory AT firmware support
  and a tiny 50 × 23 mm form factor. Intended for quick LoRa bring-up and
  GPIO-level prototyping rather than a finished enclosure.
transports:
  - usb
hardware:
  mcu:
    model: stm32wl
    flashMb: 0.25
    # Source: https://files.seeedstudio.com/products/317990687/res/STM32WLE5JC%20Datasheet.pdf
    ramKb: 64
  radios:
    - technology: lora
      chip: stm32wl
      frequencyVariants:
        - '868'
        - '915'
        - '923'
      txPowerDbm: 22
  display:
    status: none
  gnss:
    status: none
  input:
    - type: button
      description: Boot
    - type: button
      description: Reset
  physical:
    dimensionsMm:
      width: 50
      height: 23
interfaces:
  usb:
    connector: USB-C
    capabilities:
      - power
      - serial
      - flashing
  wifi:
    status: none
