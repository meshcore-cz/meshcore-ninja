description: >-
  High-power LoRa radio module delivering 30 dBm (1 W) output with an
  integrated LNA and optional band-pass filter. SPI interface. The 868/915 MHz
  variants use SX1262; the 433 MHz variant uses SX1268. Used as the RF
  front-end in several MeshCore-compatible boards including the MeshSmith
  PiMesh-1W, Photon-1W, and EtherMesh-1W.
