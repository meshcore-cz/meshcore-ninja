# Source: https://mesh-sn.de/en/devices/details/raspberry-pi-pico2-w-waveshare-sx1262
# Source: https://meshtastic.org/docs/hardware/devices/raspberrypi/pico/
name: Raspberry Pi Pico2 W + Waveshare SX1262
vendorId: raspberry
kind: kit
lifecycle: active
familyId: raspberry-pi-pico2-w-waveshare-sx1262
official: true
refs:
  mesh-sh-device: raspberry-pi-pico2-w-waveshare-sx1262
description: >-
  Raspberry Pi Pico2 W paired with a Waveshare SX1262 LoRa HAT for compact
  MeshCore/Meshtastic builds. RP2350 + Wi-Fi/BLE on the Pico2 W, external
  antenna on the HAT, and a simple USB-powered kit format for low-cost testing.
roles:
  - companion
  - repeater
  - room-server
transports:
  - ble
  - usb
  - wifi
hardware:
  mcu:
    model: rp2350
    flashMb: 4
    # Source: https://mesh-sn.de/en/devices/details/raspberry-pi-pico2-w-waveshare-sx1262
    ramKb: 520
  radios:
    - technology: lora
      chip: sx1262
      frequencyVariants:
        - '868'
        - '915'
      antenna: SMA
  display:
    status: none
  gnss:
    status: none
  leds:
    status: present
    description: On-board status LED
  power:
    batterySupported: false
    batteryBuiltIn: false
    charging: false
    solarInput: false
    # Source: https://mesh-sn.de/en/devices/details/raspberry-pi-pico2-w-waveshare-sx1262
    consumptionIdleMa: 20
    consumptionTxMa: 100
  physical:
    dimensionsMm:
      width: 51
      height: 21
    weightG: 15
interfaces:
  usb:
    connector: Micro-USB
    capabilities:
      - power
      - serial
      - flashing
  bluetooth:
    version: '5.0'
    ble: true
  wifi:
    status: present
