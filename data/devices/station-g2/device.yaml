# Source: https://shop.uniteng.com/product/meshtastic-mesh-device-station-edition/
# Source: https://wiki.uniteng.com/en/meshtastic/station-g2
name: UnitEng Station G2
vendorId: uniteng
kind: product
lifecycle: active
familyId: uniteng-station-g2
image: station_g2.svg
official: true
refs:
  mesh-sh-device: station-g2
product_url: https://wiki.uniteng.com/en/meshtastic/station-g2
aliases:
  - Station G2
description: >-
  Station-class ESP32-S3 mesh device with a high-power LoRa front end, tuned
  for improved receive sensitivity and 35 dBm transmit capability. Intended for
  fixed installations or vehicle mounting with an external antenna.
roles:
  - companion
  - repeater
  - room-server
transports:
  - ble
  - usb
  - wifi
hardware:
  mcu:
    model: esp32-s3
    # Source: https://mesh-sn.de/en/devices/details/station-g2
    ramKb: 512
    flashMb: 16
  radios:
    - technology: lora
      chip: sx1262
      frequencyVariants:
        - '868'
        - '915'
      txPowerDbm: 35
      antenna: SMA
  display:
    status: present
    technology: oled
    size: 1.3
    resolution:
      width: 128
      height: 64
    colors: monochrome
  gnss:
    status: none
  leds:
    status: present
    description: Status LEDs
  input:
    - type: button
      description: power button
  power:
    batterySupported: false
    batteryBuiltIn: false
    charging: false
    solarInput: false
    batteryConnector: extern (Netzteil)
    # Source: https://mesh-sn.de/en/devices/details/station-g2
    consumptionIdleMa: 250
    consumptionTxMa: 3550
  physical:
    dimensionsMm:
      width: 85
      height: 50
      depth: 25
    weightG: 150
interfaces:
  usb:
    connector: none
    capabilities:
      - serial
      - flashing
  bluetooth:
    version: '5.0'
    ble: true
  wifi:
    status: present
    standard: 802.11 b/g/n
