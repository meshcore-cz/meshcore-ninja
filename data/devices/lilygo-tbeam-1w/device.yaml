# Source: meshcore-dev/MeshCore variants/lilygo_tbeam_1w/platformio.ini + boards/t_beam_1w.json
# Source: https://lilygo.cc/en-us/products/t-beam-1w
name: LilyGo T-Beam 1W
vendorId: lilygo
kind: product
lifecycle: active
familyId: lilygo-t-beam
aliases:
  - T-Beam 1W
product_url: https://lilygo.cc/en-us/products/t-beam-1w
official: true
refs:
  mesh-sh-device: lilygo-t-beam-1w
description: >-
  ESP32-S3 T-Beam variant with higher-power LoRa front end, GNSS, OLED, and an
  18650 battery bay. Designed for long-range mesh nodes where a 1 W class radio
  and the standard T-Beam layout are desired.
transports:
  - ble
  - usb
  - wifi
hardware:
  mcu:
    model: esp32-s3
    flashMb: 16
    psramMb: 8
    # Source: https://linuxgizmos.com/lilygo-expands-t-beam-series-with-new-1w-lora-gps-board/
    ramKb: 512
  radios:
    - technology: lora
      chip: sx1262
      frequencyVariants:
        - '433'
        - '868'
        - '915'
      txPowerDbm: 32
      antenna: SMA
  display:
    status: present
    technology: oled
    controller: SH1106
    size: 1.3
    resolution:
      width: 128
      height: 64
    colors: monochrome
  gnss:
    status: present
    chip: L76K
  leds:
    status: present
    description: Status LEDs
  power:
    batterySupported: true
    batteryBuiltIn: false
    charging: true
    solarInput: false
    pmic: AXP2101
    batteryConnector: 18650 Holder
    # Source: https://mesh-sn.de/hardware/details/lilygo-t-beam-1w
    consumptionIdleMa: 60
    consumptionTxMa: 500
  physical:
    dimensionsMm:
      width: 120
      height: 50
      depth: 20
    # Source: https://mesh-sn.de/hardware/details/lilygo-t-beam-1w
    weightG: 80
  input:
    - type: button
      description: boot
    - type: button
      description: reset
    - type: button
      description: power
    - type: button
      description: io03
interfaces:
  usb:
    connector: unknown
    capabilities:
      - power
      - serial
      - flashing
  bluetooth:
    version: '5.0'
    ble: true
  wifi:
    status: present
