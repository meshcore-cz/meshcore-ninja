    prerelease: false
    notes: "Based on MeshCore v1.16.0\r\nmain@e8d3c53ba1ea863937081cd0caad759b832f3028\r\n\r\n### Features\r\n\r\n- Added SHTC3 temperature/humidity sensor support (fixed I²C address 0x70) to the environment-sensor manager.\r\n- Added smart adverts: deterministic, collision-resistant flood-advert scheduling over a rolling 23h window, with each node's slot derived from its name and public key plus per-cycle jitter. (@DiogoLinoPT)\r\n- Disabled the per-hop probabilistic forwarding filter (`P(h)=0.308^(hops-1)`) that randomly dropped flood adverts as they propagated.\r\n- Implemented hardware Channel Activity Detection (CAD) listen-before-talk before each transmit, enabled by default (Cherry-picked upstream PR #1727).\r\n- Loop detection is now enabled by default at `LOOP_DETECT_MINIMAL` sensitivity (previously off).\r\n- Outbound packets are now expired and dropped once they exceed the maximum queue age (`MAX_PACKET_QUEUE_AGE_MS`).\r\n- Reverted the default airtime (duty-cycle) factor to 1.0, i.e. a 50% duty cycle, rolling back the prior setting that caused internationalization-related issues.\r\n- The repeater home screen now surfaces battery charge as an intuitive percentage, so remaining power can be read at a glance.\r\n- The repeater path-hash mode now defaults to 2 bytes (`path_hash_mode=1`), up from 1 byte.\r\n\r\n### Client\r\n\r\n- Implemented hardware Channel Activity Detection (CAD) listen-before-talk before each transmit, enabled by default (Cherry-picked upstream PR #1727).\r\n- Rendered the T114 boot logo as a true-color RGB image at its native panel resolution (192×54).\r\n- Shrunk the T114 battery indicator icon to 16×8 logical pixels.\r\n- Switched the T114 ST7789 font to DejaVu Sans UI.\r\n- The client path-hash mode now defaults to 2 bytes (`path_hash_mode=1`), up from 1 byte.\r\n\r\n### Security\r\n\r\n- Fixed network time replay vulnerability; reject time-source timestamps not newer than the last accepted one.\r\n- Enforce initial sync (forward-only) vs maintenance sync (±60s), replacing the symmetric ±30s logic that allowed backward clock moves.\r\n\r\n### Improvements\r\n\r\n- Updated MeshCore website links and logo placement across the UI and splash screens.\r\n\r\n### KTLO\r\n\r\n- Added `--upload ` argument to `build.sh` to compile and upload firmware in a single command.\r\n- Increased the GitHub Actions parallel job limit and updated the PlatformIO dependencies.\r\n- Removed the `ENABLE_CONSENSUS_TIME_SYNC` feature from the codebase."
  - version: v2026.6.1-rc4-b5683eb
    name: v2026.6.1-rc4-b5683eb
    datetime: '2026-06-28T22:28:44Z'
    url: https://github.com/Meshcore-Portugal/lusofw/releases/tag/v2026.6.1-rc4-b5683eb
    prerelease: true
    notes: >-
      Automated dev prerelease of dev@b5683eb for v2026.6.1-rc4.



      Based on MeshCore v1.16.0

      main@e8d3c53ba1ea863937081cd0caad759b832f3028


      ### Features


      - Added SHTC3 temperature/humidity sensor support (fixed I²C address 0x70) to the
      environment-sensor manager, exposed via the `ENV_INCLUDE_SHTC3` build flag and wired into the
      RAK4631 and RAK3112 variant configs with the matching Adafruit library dependency.

      - Outbound packets are now expired and dropped once they exceed the maximum queue age
      (`MAX_PACKET_QUEUE_AGE_MS`), freeing pool slots before head-of-line blocking and clearing
      dedup state so a later copy gets another chance instead of delivering stale or duplicate
      traffic.

      - Loop detection is now enabled by default at `LOOP_DETECT_MINIMAL` sensitivity (previously
      off). It drops packets whose flood path repeats a node hash, suppressing retransmission storms
      while keeping the check cheap enough for the lowest sensitivity tier.

      - Reverted the default airtime (duty-cycle) factor to 1.0, i.e. a 50% duty cycle, rolling back
      the prior setting that caused internationalization-related issues. The factor maps to a duty
      cycle of `100/(factor+1)%` over the rolling one-hour window.

      - The repeater path-hash mode now defaults to 2 bytes (`path_hash_mode=1`), up from 1 byte.

      - Disabled the per-hop probabilistic forwarding filter (`P(h)=0.308^(hops-1)`) that randomly
      dropped flood adverts as they propagated.

      - The repeater home screen now surfaces battery charge as an intuitive percentage, so
      remaining power can be read at a glance.

      - Implemented hardware Channel Activity Detection (CAD) listen-before-talk before each
      transmit, enabled by default. The radio samples the channel and defers TX while busy, with
      bounded retry and a CAD-timeout error flag if activity persists past the maximum duration.
      (Cherry-picked upstream PR #1727).

      - Added smart adverts: deterministic, collision-resistant flood-advert scheduling over a
      rolling 23h window, with each node's slot derived from its name and public key plus per-cycle
      jitter.


      ### Client


      - Rendered the T114 boot logo as a true-color RGB image at its native panel resolution
      (192×54).

      - Switched the T114 ST7789 font to DejaVu Sans UI.

      - Shrunk the T114 battery indicator icon to 16×8 logical pixels.

      - The path hash mode defaults to 2 bytes.


      ### Security


      - Fixed network time replay vulnerability; reject time-source timestamps not newer than the
      last accepted one.

      - Enforce initial sync (forward-only) vs maintenance sync (±60s), replacing the symmetric ±30s
      logic that allowed backward clock moves.


      ### Improvements


      - Updated MeshCore website links and logo placement across the UI and splash screens.


      ### KTLO


      - Added a `build_upload.sh` wrapper to compile and upload firmware in a single command.

      - Increased the GitHub Actions parallel job limit and updated the PlatformIO dependencies.

      - Removed the `ENABLE_CONSENSUS_TIME_SYNC` feature from the codebase.
