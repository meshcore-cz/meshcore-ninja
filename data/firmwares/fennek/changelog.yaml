    notes: >-
      ## Sudoku als fünftes Spiel


      Neues Spiel **Sudoku** in der Spiele-App (neben 2048, Minensucher, Schach, Tic-Tac-Toe).


      - Arduino-freier Generator + Solver (`sudoku_core.h`, host-getestet): randomisiertes
      Backtracking für die Vollösung, dann eindeutigkeitsprüfendes Ausgraben — erzeugt nur Rätsel
      mit genau einer Lösung. Rekursionsfrei (iterativer Level-Stack).

      - 9×9-Gitter à 26 px, Touch-Tap/WASD-Cursor, Zifferntasten 1–9 setzen, 0/Backspace/Mikrofon
      leeren, Konfliktzellen invertiert, „Gelöst"-Overlay mit Zeit.

      - Schwierigkeit Leicht/Mittel/Schwer (40/32/26 Vorgaben).

      - Beststände im NVS (gelöste Rätsel + Bestzeit), inkl. INI-Export/-Import.


      **OTA:** `firmware.bin` angehängt.
