    notes: >-
      OTA-Update-Fix + Ollama-Timeout.


      - **OTA `-104` behoben:** GitHub liefert für Release-Assets eine signierte Redirect-URL
      (`release-assets.githubusercontent.com`, ~900 Zeichen). Diese sprengte den 300-Byte-Puffer in
      `apply()` → abgeschnittene URL → `httpUpdate`-Fehler `-104` (wrong http code). Puffer auf 1400
      Byte vergrößert.

      - **notes_ai (Ollama) Timeout:** `HTTPClient::setTimeout()` nimmt `uint16_t` (max 65535 ms);
      der Wert 120000 lief still auf 54464 ms über. Konstante auf 65000 ms korrigiert.


      Erstes Release, mit dem OTA von einer früheren Version aus zuverlässig durchläuft.
