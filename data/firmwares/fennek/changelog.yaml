  - version: v1.9.2
    name: Fennek v1.9.2
    datetime: '2026-06-15T15:51:06Z'
    url: https://github.com/danst0/fennek/releases/tag/v1.9.2
    prerelease: false
    notes: >-
      ### Added

      - **`BATTLOG` — opt-in battery & activity logger** (`services/battlog`). When the `BATTLOG`
      build flag is set, the firmware writes one record per event (app switch, audio track, mesh
      radio on, Wi-Fi on/off, standby/wake) **and** a battery probe every 60 s to
      `/.fennek/battery.log` (timestamp + %/mV/charging? + Wi-Fi/mesh status). It's a throttled
      PSRAM ring flushed to SD before standby, and downloadable via the Web file manager — useful
      for diagnosing real-world battery drain. Deliberately zero-cost when the flag is off (all
      `BATTLOG_*` calls compile to nothing).


      🌐 Project page & screenshots: **https://fennek.dumke.me**


      **Full changelog:** [`CHANGELOG.md`](https://github.com/danst0/fennek/blob/main/CHANGELOG.md)
  - version: v1.9.1
    name: Fennek v1.9.1
    datetime: '2026-06-15T15:51:06Z'
    url: https://github.com/danst0/fennek/releases/tag/v1.9.1
    prerelease: false
    notes: >-
      ### Fixed

      - **Notes never silently lost on a failed SD write.** The save path now clears its dirty flag
      only on a *complete* success; if an SD write or remove fails, the note stays dirty and is
      retried on the next autosave instead of being overwritten on the next editor open.

      - **Just-played track now reaches the scrobble queue before standby.** `power::poll()` stops
      audio (and lets the audio task drain the stop command) *before* the pre-standby Navidrome
      flush, so the current track is enqueued via `noteTrackEnded()` rather than landing in the
      PSRAM ring that deep sleep would otherwise discard.


      **Full changelog:** [`CHANGELOG.md`](https://github.com/danst0/fennek/blob/main/CHANGELOG.md)
