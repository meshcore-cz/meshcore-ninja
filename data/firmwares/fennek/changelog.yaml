  - version: v2.5.2
    name: Fennek v2.5.2
    datetime: '2026-06-21T14:29:15Z'
    url: https://github.com/danst0/fennek/releases/tag/v2.5.2
    prerelease: false
    notes: >-
      ## Highlights


      - **On-Device-OTA-Knopf** (Settings → Update → „Aktualisieren"): prüft GitHub-Releases und
      flasht direkt am Gerät mit Vollbild-Fortschritt (Phase + Balken + %). Kein Browser/Konsole
      mehr nötig.

      - **Notizen:** Audionotiz-Player (Play/Pause, ±10 s, Region-Fortschritt) + hoch-scrollbarer
      Editor.

      - **Karteikarten:** Übersicht mit Leitner-Fächer-Verteilung (fällig/bearbeitet).

      - **Kopfrechnen:** adaptive Schwierigkeit, je-Modus persistierte Stufe.

      - **notes_ai:** behutsamerer Korrektur-Prompt (nur Rechtschreibung/Umlaute, kein Umdichten).

      - **Tools:** `maps_tiles.py` mit wählbaren Kachelquellen (`--preset standard|cyclosm|topo`).


      ## OTA-Update


      Geräte ab v2.5.1 können direkt am Gerät auf diese Version aktualisieren (Settings → Update →
      „Aktualisieren") oder via Web-UI (`fennek.local`) / Konsole (`ota update`).


      **Flashen (USB):** `firmware.bin` in den inaktiven OTA-Slot bzw. via `pio run -e fennek -t
      upload`.
