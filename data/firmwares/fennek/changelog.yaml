  - version: v1.7.0
    name: Fennek v1.7.0
    datetime: '2026-06-13T04:03:33Z'
    url: https://github.com/danst0/fennek/releases/tag/v1.7.0
    prerelease: false
    notes: >-
      ## ✨ Added

      - **"+ New Channel" UI** for joining hashtag channels — a "► New Channel" row at the top of
      the chat list opens a join screen (keyboard types the `#name`, PSK derived from it, persisted
      to `channels.txt` on SD; jumps straight into the new channel after joining).


      ## 🔄 Changed

      - **Robust time synchronization without a hardware RTC.** Canonical clock is now ESP32 system
      time (`SystemRTCClock`), which survives deep sleep. New `services/timesync` coordinator:
      opportunistic NTP (when Wi-Fi is up) + a top-up before auto-standby, with Mesh adverts as a
      passive source. Quality model (`estErr = learned drift × time since sync`) with exponential
      back-off, `s_clockConfident` bootstrap for the first advert after boot, POSIX time zone
      (default `Europe/Berlin` incl. DST), settings rows "Time zone"/"Time", and console `time` /
      `time set` / `time sync` / `tz`.


      📋 Full history: [CHANGELOG.md](https://github.com/danst0/fennek/blob/main/CHANGELOG.md)
  - version: v1.6.3
    name: v1.6.3
    datetime: '2026-06-13T04:03:32Z'
    url: https://github.com/danst0/fennek/releases/tag/v1.6.3
    prerelease: false
    notes: >-
      ## 📡 Mesh SD persistence & clock hardening

      - Contact mirror (`/meshcore/contacts.bin`, SD takes load priority over SPIFFS, deferred write
      from `loop()`) and joined hashtag channels (`/meshcore/channels.txt`, re-joined on boot).

      - RTC sync guard against future-clock outliers (bootstrap + forward jumps < 1 h, backward only
      on a 3× advert consensus).

      - Contact overflow fix: overwrite the oldest non-favorite when the table (64) is full instead
      of dropping new adverts.

      - Console hashtag commands `join` / `chan`, plus a new `i2cscan` command. Verified on device:
      the T-Deck Pro V1.1 has **no hardware RTC** (0x51 empty).
