name: RDUMesh
also_known_as:
  - RDU Mesh
short_name: RDUMesh
description: >-
  Community-owned, off-grid MeshCore network serving Raleigh, Durham, Chapel
  Hill and the surrounding North Carolina Piedmont. The network builds
  solar-powered relay infrastructure across a documented 16-county Research
  Triangle service area.
scope: regional
status: active
part_of:
  - usa-canada-recommended
visibility: public
area: area.geojson

coverage:
  countries:
    - US

regions:
  - code: us
    name: United States
  - code: us-nc
    name: North Carolina
    parent: us
  - code: us-nc-rdu
    name: Research Triangle
    parent: us-nc

radio:
  frequency: '915'
  frequency_mhz: 910.525
  bandwidth_khz: 62.5
  spreading_factor: 7
  coding_rate: 4/5
  app_preset: 'USA/Canada (Recommended)'

community:
