name: EastMesh
short_name: EastMesh AU
description: >-
  Community MeshCore network for southeast Australia, based around Victoria and
  linked through NSW/ACT/Tasmania, supporting off-grid messaging, emergency
  response, outdoor use and mesh infrastructure with a public map, wiki,
  Discord, CoreScope instance and EastMesh firmware builds.
scope: regional
status: active
visibility: public
area: area.geojson

coverage:
  countries:
    - AU

radios:
  - name: Australia Narrow
    description: EastMesh default; also used for links south to Canberra and beyond.
    frequency: '915'
    frequency_mhz: 916.575
    bandwidth_khz: 62.5
    spreading_factor: 7
    coding_rate: 4/8
    tx_power_dbm: 20
    public_channel: Public
  - name: Australia Mid
    description: Bridged/nearby Australian preset used around Greater Sydney and surrounds.
    frequency: '915'
    frequency_mhz: 915.075
    bandwidth_khz: 125
    spreading_factor: 9
    coding_rate: 4/5
    tx_power_dbm: 20
    public_channel: Public

community:
  website: https://eastmesh.au/
  forum: https://forum.eastmesh.au/
  discord: https://discord.gg/meshcore

maps:
  - name: Network map
    url: https://map.eastmesh.au/?lat=-32.81893&lon=147.19441&zoom=5&layer=dark&history=off&heat=off&labels=off&nodes=on&legend=off&menu=off&units=km&history_filter=0

analyzers:
  - name: CoreScope
    url: https://core.eastmesh.au/

resources:
  status_page: https://obs.eastmesh.au/
  getting_started: https://wiki.eastmesh.au/
  links:
    - name: MeshCoreAus wiki
      url: https://wiki.meshcoreaus.org/
    - name: EastMesh flasher
      url: https://flasher.eastmesh.au/
    - name: EastMesh firmware
      url: https://github.com/xJARiD/MeshCore-EastMesh
    - name: EastMesh firmware docs
      url: https://xjarid.github.io/MeshCore-EastMesh/
    - name: MeshCore flasher
      url: https://flasher.meshcore.io/
    - name: MQTT observer instructions
      url: https://eastmesh.au/
