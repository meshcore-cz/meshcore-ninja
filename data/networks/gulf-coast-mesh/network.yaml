coverage:
  countries:
    - US

regions:
  - code: us
    name: United States
  - code: gulf-coast
    name: Gulf Coast
    parent: us
  - code: louisiana
    name: Louisiana
    parent: gulf-coast

radio:
  frequency: '915'
  frequency_mhz: 910.525
  bandwidth_khz: 62.5
  spreading_factor: 7
  coding_rate: 4/5
  public_channel: Public

