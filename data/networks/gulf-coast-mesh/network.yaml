name: Gulf Coast Mesh
also_known_as:
  - Louisiana Mesh
  - Louisiana MeshCore
short_name: Gulf Coast
description: >-
  Volunteer-built MeshCore network anchored in Louisiana and growing across the
  US Gulf Coast, with live CoreScope monitoring, setup tools, local docs,
  recurring meetings and Discord coordination.
scope: regional
status: active
part_of:
  - usa-canada-recommended
visibility: public
