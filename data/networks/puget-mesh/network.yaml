name: Puget Mesh
short_name: Puget Mesh
description: >-
  Volunteer-led community deploying off-grid communication networks across the
  Puget Sound region, including MeshCore, Meshtastic and AREDN. Focused on
  disaster preparedness and emergency response, with active MeshCore buildout
  on the USA/Canada 915 MHz preset serving Seattle, Tacoma and surrounding areas.
scope: local
status: active
part_of:
  - cascadia-mesh
  - west-coast-mesh
  - usa-canada-recommended
visibility: public

coverage:
  countries:
    - US
area: area.geojson

regions:
  - code: us
    name: United States
  - code: us-west
    name: West Coast
  - code: wa
    name: Washington
    parent: us-west
  - code: wa-puget
    name: Puget Sound
    parent: wa

radio:
  frequency: '915'
  frequency_mhz: 910.525
  bandwidth_khz: 62.5
  spreading_factor: 7
  coding_rate: 4/5
  tx_power_dbm: 22
  region_code: wa-puget
  public_channel: Public

