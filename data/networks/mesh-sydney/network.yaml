name: MeshSydney
also_known_as:
  - MeshCore Sydney
  - NSW MeshCore Network
short_name: MeshSydney
description: >-
  Community MeshCore network for Sydney and New South Wales, Australia, using
  the Australia Mid preset as the main Greater Sydney setting and Australia
  Narrow for EastMesh links south toward Canberra and beyond.
scope: regional
status: active
part_of:
  - australia
  - australia-mid
  - australia-narrow
visibility: public
area: area.geojson

coverage:
  countries:
    - AU

radios:
  - name: Australia Mid
    description: Main preset recommended for Greater Sydney and surrounds.
    frequency: '915'
    frequency_mhz: 915.075
    bandwidth_khz: 125
    spreading_factor: 9
    coding_rate: 4/5
    tx_power_dbm: 20
    public_channel: Public
  - name: Australia Narrow
    description: EastMesh default and bridge/link preset south toward Canberra and beyond.
    frequency: '915'
    frequency_mhz: 916.575
    bandwidth_khz: 62.5
    spreading_factor: 7
    coding_rate: 4/8
    tx_power_dbm: 20
    public_channel: Public

community:
  website: https://meshsydney.com/
  discord: https://discord.gg/CQNZSsAchj

maps:
  - name: CoreSense live map
    url: https://meshsydney.com/coresense-map.html
  - name: Network maps
    url: https://meshsydney.com/maps.html
  - name: NSW Meshcore map
    url: https://nswmesh.github.io/NSW-Sydney-Meshcore-Map/

resources:
  getting_started: https://meshsydney.com/wiki.html#getting-started
  links:
    - name: MeshSydney wiki
      url: https://meshsydney.com/wiki.html
    - name: Radio settings
      url: https://meshsydney.com/wiki.html#radio-settings
    - name: Network statistics
      url: https://meshsydney.com/stats.html
    - name: FAQ
      url: https://meshsydney.com/faq.html
    - name: Build guide
      url: https://meshsydney.com/build.html
