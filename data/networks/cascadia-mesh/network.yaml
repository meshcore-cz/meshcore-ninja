name: CascadiaMesh
also_known_as:
  - Cascadia Mesh
  - CascadiaMesh Network
short_name: CascadiaMesh
description: >-
  Pacific Northwest MeshCore network spanning British Columbia, Washington,
  Oregon and Northern California, focused on solar-powered repeaters, public
  channels and an Interstate 5 corridor between regional clusters.
scope: regional
status: active
visibility: public
area: area.geojson

coverage:
  countries:
    - CA
    - US

radio:
  frequency: '915'
  frequency_mhz: 910.525
  bandwidth_khz: 62.5
  spreading_factor: 7
  coding_rate: 4/5
  tx_power_dbm: 22
  path_hash_mode: 3-Byte
  public_channel: Public

community:
  website: https://cascadiamesh.org/
