name: WNY MeshCore
also_known_as:
  - Western NY MeshCore
short_name: WNY MeshCore
description: >-
  Volunteer-run MeshCore community building a Western New York communication
  backbone from the Pennsylvania border to Lake Ontario, east to Rochester, with
  repeaters across the Buffalo-Rochester corridor and public setup guides.
