name: TennMesh
also_known_as:
  - Tennessee Mesh
  - Tennessee MeshCore
short_name: TennMesh
description: >-
  Community-built Tennessee MeshCore network for off-grid text messaging across
  the state, with recommended settings, setup guidance, public channels,
  reports and a live CoreScope map.
scope: regional
status: active
visibility: public
