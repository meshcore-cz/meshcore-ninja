name: Greater Boston Mesh
short_name: Boston Mesh
description: >-
  Volunteer-led MeshCore and Meshtastic community building resilient off-grid
  communications across Massachusetts and the surrounding New England region.
  Most active statewide traffic runs on MeshCore using the USA/Canada preset.
scope: regional
status: active
part_of:
  - new-england-mesh
  - usa-canada-recommended
visibility: public

coverage:
  countries:
    - US
area: area.geojson

regions:
  - code: ma
    name: Massachusetts
  - code: newengland
    name: New England
  - code: us
    name: United States
  - code: ct
    name: Connecticut
    parent: newengland
  - code: me
    name: Maine
    parent: newengland
  - code: nh
    name: New Hampshire
    parent: newengland
  - code: ri
    name: Rhode Island
    parent: newengland
  - code: vt
    name: Vermont
    parent: newengland

radio:
  frequency: '915'
  frequency_mhz: 910.525
  bandwidth_khz: 62.5
  spreading_factor: 7
  coding_rate: 4/5
  region_code: ma
  public_channel: Public

community:
  website: https://bostonme.sh/
  discord: https://discord.gg/MUVASVEEES
  contact: https://github.com/bostonmesh/bostonmesh/issues

maps:
