name: Inland NW Mesh
also_known_as:
  - Inland Northwest Mesh
short_name: INW Mesh
description: >-
  Volunteer-run MeshCore network serving Spokane, Coeur d'Alene, the Palouse
  and Lewiston/Clarkston, with wider growth across Eastern Washington and
  Idaho. The community focuses on resilient off-grid communications through
  independently powered LoRa nodes.
scope: regional
status: active
part_of:
  - cascadia-mesh
  - usa-canada-recommended
visibility: public
area: area.geojson

coverage:
  countries:
    - US

radio:
  frequency: '915'
  frequency_mhz: 910.525
  bandwidth_khz: 62.5
  spreading_factor: 7
  coding_rate: 4/5
  path_hash_mode: 2-Byte
  public_channel: '#inland-nw'
  app_preset: 'USA/Canada (Recommended)'

community:
  website: https://inlandnwmesh.org/
  discord: https://discord.gg/VzFcvSxxyr
  facebook: https://www.facebook.com/share/g/1EHr7Hu9nn/
  contact: https://inlandnwmesh.org/contact

maps:
  - name: Wardrive coverage map
    url: https://wardrive.inwmesh.org/

analyzers:
  - name: Inland NW Mesh CoreScope
    url: https://scope.inwmesh.org

resources:
  getting_started: https://inlandnwmesh.org/how-to-join
  links:
    - name: MeshCore Newbie Guide
      url: https://inlandnwmesh.org/wiki/newbs
    - name: Network policies and radio settings
      url: https://inlandnwmesh.org/wiki/network-policies
    - name: Repeater setup guide
      url: https://inlandnwmesh.org/wiki/newbs/node-setup
    - name: Community wiki
      url: https://inlandnwmesh.org/wiki
    - name: Regional network groups
      url: https://inlandnwmesh.org/network
