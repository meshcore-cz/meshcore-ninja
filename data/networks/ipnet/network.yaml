#    url: https://corescope.ipnt.uk

resources:
  getting_started: https://corescope.ipnt.uk/join
  links:
    - name: Dashboard
      url: https://corescope.ipnt.uk/dashboard
    - name: Nodes
      url: https://corescope.ipnt.uk/nodes
    - name: Operators
      url: https://corescope.ipnt.uk/operators
    - name: GitHub
      url: https://github.com/ipnt
