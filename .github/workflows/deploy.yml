name: Test & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Allow one concurrent deployment; don't cancel an in-progress production run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    name: Validate data & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      # Reuse previously rendered OG cards; build-og.js only regenerates the
      # items whose data/template hash changed.
      - name: Cache OG cards
        uses: actions/cache@v5
        with:
          path: |
            static/og
            .cache/og
          key: og-${{ hashFiles('data/devices/**', 'data/vendors/**', 'data/firmwares/**', 'scripts/build-og.js') }}
          restore-keys: |
            og-
      # Validate every YAML record against the JSON Schemas + referential checks.
      - name: Validate data
        run: npm test
      # Ensure the static site builds (also regenerates data.json + OG cards via prebuild).
      - name: Build
        run: npm run build

  build:
    name: Build site for Pages
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Cache OG cards
        uses: actions/cache@v5
        with:
          path: |
            static/og
            .cache/og
          key: og-${{ hashFiles('data/devices/**', 'data/vendors/**', 'data/firmwares/**', 'scripts/build-og.js') }}
          restore-keys: |
            og-
      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v6
      # base_path is "/<repo>" for project sites, "" for user/org root sites —
      # svelte.config.js reads it via process.env.BASE_PATH.
      - name: Build
        run: npm run build
        env:
          BASE_PATH: ${{ steps.pages.outputs.base_path }}
          SITE_ORIGIN: https://meshcore.ninja
          VITE_SITE_ORIGIN: https://meshcore.ninja
          PUBLIC_PLAUSIBLE_SCRIPT_URL: https://x.meshcore.ninja/js/pa-CELA0z_On7nm-NCODtDZB.js
          # Live analyzer metrics come from the Go API (see api/). Setting this
          # enables the pulse UI; leaving it unset disables it gracefully.
          VITE_API_BASE: https://api.meshcore.ninja
      # The single source of the github-pages artifact. Keeping this out of the
      # deploy job means re-running deploy never produces duplicate artifacts.
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: build

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
